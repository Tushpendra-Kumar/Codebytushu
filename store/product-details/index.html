<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | CodeByTushu Store</title>

    <link rel="icon" href="../../favicon.ico?v=6" sizes="any">
    <link rel="icon" href="../../favicon-32x32.png?v=6" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="../../apple-touch-icon.png?v=6" sizes="180x180">
    <meta name="theme-color" content="#ffc400">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <link rel="stylesheet" href="../../styles.css?v=40">
    <link rel="stylesheet" href="../store.css?v=1">
</head>
<body>
    <!-- Futuristic Animated Background (Global for Store) -->
    <div class="cbt-hero-bg" style="position: fixed; z-index: -1; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none;">
        <div class="cbt-glow-center"></div>
        <div class="cbt-streak cbt-streak-1"></div>
        <div class="cbt-streak cbt-streak-2"></div>
        <div class="cbt-streak cbt-streak-3"></div>
        <div class="cbt-streak cbt-streak-4"></div>
        <div class="cbt-circle cbt-circle-left"></div>
        <div class="cbt-circle cbt-circle-right"></div>
        <div class="cbt-dots cbt-dots-top-left"></div>
        <div class="cbt-dots cbt-dots-bottom-right"></div>
        <div class="cbt-particles">
            <span class="cbt-particle p-1"></span><span class="cbt-particle p-2"></span>
            <span class="cbt-particle p-3"></span><span class="cbt-particle p-4"></span>
            <span class="cbt-particle p-5"></span><span class="cbt-particle p-6"></span>
            <span class="cbt-particle p-7"></span><span class="cbt-particle p-8"></span>
        </div>
    </div>

    <script src="../../theme.js"></script>

    <!-- ===================== NAVBAR ===================== -->
    <nav class="cbt-navbar navbar" id="mainNavbar">
        <div class="cbt-nav-inner">
            <div class="cbt-logo" id="cbt-logo">
                <a href="../../index.html" id="cbt-logo-link">
                    <img src="../../image1/Black%20Logo.PNG" alt="Logo" class="cbt-main-logo-img">
                    <span class="cbt-logo-text">CodeBy<span class="cbt-logo-accent">Tushu</span></span>
                </a>
            </div>
            <ul class="cbt-center-nav" id="cbt-center-nav">
                <li><a href="../index.html" class="cbt-nav-link">Home</a></li>
                <li><a href="../index.html#all-products" class="cbt-nav-link active">All Products</a></li>
                <li><a href="../cart/index.html" class="cbt-nav-link">My Cart</a></li>
                <li><a href="../index.html#faq" class="cbt-nav-link">FAQ</a></li>
            </ul>
            <div class="cbt-nav-right">
                <a href="../cart/index.html" class="cbt-nav-cart-btn" aria-label="Cart">
                    <span class="material-symbols-rounded">shopping_cart</span>
                    <span class="cbt-cart-counter" style="display: none;">0</span>
                </a>
                <button class="cbt-hamburger-btn" id="cbt-hamburger-btn" aria-label="Menu">
                    <span class="cbt-ham-bar"></span><span class="cbt-ham-bar"></span><span class="cbt-ham-bar"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ===================== PRODUCT DETAILS CONTAINER ===================== -->
    <div id="product-details-content">
        <!-- JS will inject product details here -->
        <p style="text-align:center; padding:100px; color:var(--text-muted);">Loading product details...</p>
    </div>

    <!-- ===================== FOOTER ===================== -->
    <footer class="cbt-footer">
        <div class="cbt-footer-container">
            <div class="cbt-ft-col cbt-ft-brand">
                <a href="../../index.html" class="cbt-logo">
                    <span class="cbt-logo-bracket">&lt;/&gt;</span>
                    <span class="cbt-logo-text">CodeBy<span class="cbt-logo-accent">Tushu</span></span>
                </a>
                <p style="margin-top: 15px; color: var(--text-muted); line-height: 1.6;">Premium developer merchandise and high-quality digital assets.</p>
            </div>
            <div class="cbt-ft-col cbt-ft-newsletter">
                <h3><i class="fa-regular fa-paper-plane"></i> STAY UPDATED</h3>
                <form class="cbt-ft-form cbt-course-subscribe-form">
                    <div class="cbt-ft-input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" class="newsletter-email" name="email" placeholder="Enter your email" required aria-label="Email Address">
                    </div>
                    <button type="submit" class="cbt-ft-btn"><span class="newsletter-btn-text">Subscribe</span> <i class="fa-solid fa-arrow-right"></i></button>
                </form>
                <div class="newsletter-message" style="margin-top: 15px; font-size: 14px; display: none; padding: 10px; border-radius: 6px;"></div>
            </div>
        </div>
        <div class="cbt-copyright-strip" style="text-align: center; border-top: 1px solid var(--border-color); padding: 20px 0; margin-top: 20px; background: transparent !important;">
            <p>&copy; 2025 CodeByTushu. All rights reserved.</p>
        </div>
    </footer>

    <!-- JS -->
    <script src="../js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const container = document.getElementById('product-details-content');
            
            if (!productId || typeof getProductById !== 'function') {
                container.innerHTML = '<p style="text-align:center; padding:100px; color:var(--text-heading); font-size:1.5rem;">Product not found or invalid ID.</p>';
                return;
            }
            
            const product = getProductById(productId);
            if (!product) {
                container.innerHTML = '<p style="text-align:center; padding:100px; color:var(--text-heading); font-size:1.5rem;">Product not found.</p>';
                return;
            }

            const stockClass = product.stockStatus === 'in-stock' ? 'stock-in' : 'stock-out';
            const stockText = product.stockStatus === 'in-stock' ? 'In Stock' : 'Out of Stock';

            // Generate gallery HTML
            let galleryHtml = '';
            if (product.gallery && product.gallery.length > 0) {
                galleryHtml += `<img src="${product.gallery[0]}" class="cbt-main-image" id="main-image" alt="${product.title}">`;
                if (product.gallery.length > 1) {
                    galleryHtml += '<div class="cbt-thumbnail-list">';
                    product.gallery.forEach((imgUrl, idx) => {
                        galleryHtml += `<img src="${imgUrl}" class="cbt-thumbnail ${idx === 0 ? 'active' : ''}" onclick="changeImage(this, '${imgUrl}')">`;
                    });
                    galleryHtml += '</div>';
                }
            } else {
                galleryHtml = `<img src="${product.image}" class="cbt-main-image" alt="${product.title}">`;
            }

            // Generate features HTML
            let featuresHtml = '';
            if (product.features && product.features.length > 0) {
                featuresHtml = '<ul class="cbt-features-list">';
                product.features.forEach(f => {
                    featuresHtml += `<li>${f}</li>`;
                });
                featuresHtml += '</ul>';
            }

            container.innerHTML = `
                <div class="cbt-product-details-container">
                    <div class="cbt-product-gallery">
                        ${galleryHtml}
                    </div>
                    <div class="cbt-product-info">
                        <div class="cbt-product-info-category">${product.category}</div>
                        <h1 class="cbt-product-info-title">${product.title}</h1>
                        <div class="cbt-product-rating" style="margin-bottom:20px; font-size:1.1rem; color:var(--primary);">
                            <i class="fa-solid fa-star"></i> ${product.rating} <span style="color:var(--text-muted);">(${product.reviews} reviews)</span>
                        </div>
                        <div class="cbt-product-info-price">$${product.price}</div>
                        
                        <span class="cbt-product-stock-badge ${stockClass}" style="position:relative; top:0; right:0; margin-bottom:20px; display:inline-block;">${stockText}</span>
                        
                        <p class="cbt-product-info-desc">${product.description}</p>
                        
                        ${featuresHtml}
                        
                        <div class="cbt-divider"></div>
                        
                        ${product.stockStatus === 'in-stock' ? `
                            <div class="cbt-quantity-selector">
                                <span style="color:var(--text-muted); font-weight:600;">Quantity:</span>
                                <button class="cbt-qty-btn" onclick="updateQty(-1)">-</button>
                                <input type="number" id="product-qty" class="cbt-qty-input" value="1" min="1" readonly>
                                <button class="cbt-qty-btn" onclick="updateQty(1)">+</button>
                            </div>
                            <button class="cbt-btn-primary" style="width:100%; font-size:1.2rem; padding:15px;" onclick="addToCartDetailed('${product.id}')">
                                Add to Cart
                            </button>
                        ` : `
                            <button class="cbt-btn-primary" style="width:100%; font-size:1.2rem; padding:15px; opacity:0.5; cursor:not-allowed;" disabled>
                                Out of Stock
                            </button>
                        `}
                    </div>
                </div>
            `;
            
            document.title = `${product.title} | CodeByTushu Store`;
        });

        // Global functions for inline handlers
        window.changeImage = function(elem, src) {
            document.getElementById('main-image').src = src;
            document.querySelectorAll('.cbt-thumbnail').forEach(t => t.classList.remove('active'));
            elem.classList.add('active');
        };

        window.updateQty = function(change) {
            const input = document.getElementById('product-qty');
            let val = parseInt(input.value) + change;
            if (val < 1) val = 1;
            input.value = val;
        };

        window.addToCartDetailed = function(productId) {
            const product = getProductById(productId);
            if (!product) return;
            const qty = parseInt(document.getElementById('product-qty').value) || 1;

            let cartItems = JSON.parse(localStorage.getItem('cbt_cart')) || [];
            const existingItem = cartItems.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity = (existingItem.quantity || 1) + qty;
            } else {
                cartItems.push({
                    id: product.id,
                    title: product.title,
                    price: product.price,
                    image: product.image,
                    category: product.category,
                    isCourse: false,
                    quantity: qty
                });
            }
            
            localStorage.setItem('cbt_cart', JSON.stringify(cartItems));
            window.dispatchEvent(new Event('cartUpdated'));
            alert(`${qty}x ${product.title} added to cart!`);
        };

        // Header logics
        function updateCartCount() {
            const countElem = document.getElementById('cart-count');
            if (countElem) {
                const cart = JSON.parse(localStorage.getItem('cbt_cart')) || [];
                let totalItems = 0;
                cart.forEach(item => {
                    totalItems += (item.quantity || 1);
                });
                countElem.textContent = totalItems;
                if(totalItems > 0) countElem.style.display = 'flex';
                else countElem.style.display = 'none';
            }
        }
        updateCartCount();
        window.addEventListener('cartUpdated', updateCartCount);

        const ham = document.getElementById('cbt-hamburger-btn');
        const nav = document.getElementById('cbt-center-nav');
        if(ham && nav) {
            ham.addEventListener('click', () => nav.classList.toggle('show'));
        }
    </script>
</body>
</html>
