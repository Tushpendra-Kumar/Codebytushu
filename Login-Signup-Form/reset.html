<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/Login-Signup-Form/index.css" />
</head>
<body>
  <!-- same outer card jaise login form -->
  <div class="container reset-container">
    <div class="form-box reset-box">
      <h2>Reset Password</h2>

      <form id="resetForm">
        <div class="input-box">
          <input type="email" id="resetEmail" required />
          <label for="resetEmail">Email</label>
        </div>

        <div class="input-box">
          <input type="text" id="resetCode" required />
          <label for="resetCode">Reset Code</label>
        </div>

        <div class="input-box">
  <input type="password" id="resetNewPwd" required />
  <label for="resetNewPwd">New Password</label>
</div>
<div class="input-box">
  <input type="password" id="resetConfirmPwd" required />
  <label for="resetConfirmPwd">Confirm Password</label>
</div>


        <div class="btn-wrapper">
          <button type="submit" class="btn">Set New Password</button>
        </div>
      </form>

      <p class="reset-helper">
        Didn't receive a code?
        <a href="/Login-Signup-Form/index.html">Back to login</a>
      </p>
    </div>
  </div>

  <!-- same JS logic as pehle -->
  <script>
    document.getElementById('resetForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('resetEmail').value.trim().toLowerCase();
      const code = document.getElementById('resetCode').value.trim();
      const newPwd = document.getElementById('resetNewPwd').value;

      if(!email || !code || !newPwd){
        alert('Please fill all fields');
        return;
      }

      const tokenKey = 'cb_reset_' + email;
      const tokenDataRaw = localStorage.getItem(tokenKey);
      if(!tokenDataRaw){
        alert('No reset request found for this email. Request new code from login page.');
        return;
      }
      try {
        const tokenData = JSON.parse(tokenDataRaw);
        const now = Date.now();
        if(now > tokenData.expires){
          localStorage.removeItem(tokenKey);
          alert('Reset code expired. Please request a new code.');
          return;
        }
        if(tokenData.code !== code){
          alert('Invalid reset code.');
          return;
        }

        const users = JSON.parse(localStorage.getItem('cb_users') || '{}');
        if(!users[email]){
          alert('No account registered with this email.');
          return;
        }
        users[email].password = newPwd; // prototype only
        localStorage.setItem('cb_users', JSON.stringify(users));
        localStorage.removeItem(tokenKey);
        alert('Password updated. You can now login with your new password.');
        window.location.href = '/Login-Signup-Form/index.html';
      } catch(err){
        console.error(err);
        alert('Something went wrong. Try again.');
      }
    });
  </script>
</body>
</html>
